<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Representation Matters</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      width: 300px;
      max-width: 90%;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    pre {
      text-align: left;
      white-space: pre-wrap;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      max-width: 800px;
      margin: auto;
    }
  </style>
</head>

<body>

  <h1>✨ Representation Matters</h1>

  <input id="input" placeholder="e.g. black male actor" />
  <br />
  <button onclick="generateStory()">Generate Story</button>

  <pre id="output"></pre>

  <script src="script.js"></script>
</body>
</html>
