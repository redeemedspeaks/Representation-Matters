<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Representation Matters</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: white;
      color: black;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      width: 320px;
      max-width: 90%;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 18px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }

    pre {
      background: #f0f0f0;
      padding: 20px;
      margin-top: 20px;
      text-align: left;
      white-space: pre-wrap;
      border-radius: 10px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>

<body>

  <h1>✨ Representation Matters</h1>

  <input id="input" placeholder="e.g. black female inventor" />
  <br />
  <button onclick="generateStory()">Generate Story</button>

  <pre id="output"></pre>

  <script src="script.js"></script>
</body>
</html>
