<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Representation Matters</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: white;
      color: black;
      text-align: center;
      padding: 20px;
    }
    h1 {
      margin-bottom: 10px;
    }
    .input-group {
      margin: 8px 0;
    }
    label {
      font-weight: bold;
      margin-right: 6px;
    }
    input {
      padding: 10px;
      width: 260px;
      max-width: 90%;
      margin-bottom: 6px;
      border-radius: 5px;
      border: .5px solid #ccc;
      font-size: 1rem;
    }
    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      margin-top: 8px;
      font-size: 1rem;
    }
    .story-output {
      background: #f0f0f0;
      padding: 20px;
      margin-top: 22px;
      text-align: left;
      white-space: pre-wrap;
      border-radius: 12px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      font-size: 1.15rem;
      min-height: 120px;
    }
    @media (max-width: 500px) {
      input {
        width: 93%;
      }
      .story-output {
        font-size: 1rem;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <h1>✨ Representation Matters</h1>
  <p>Pick <b>race</b>, <b>gender</b>, and/or <b>career</b>—get a bedtime story about a real-life hero!</p>
  <div class="input-group">
    <label for="race">Race:</label>
    <input id="race" placeholder="e.g. Black, Latino, Asian, White" autocomplete="off" />
  </div>
  <div class="input-group">
    <label for="gender">Gender:</label>
    <input id="gender" placeholder="e.g. male, female, man, woman" autocomplete="off" />
  </div>
  <div class="input-group">
    <label for="career">Career:</label>
    <input id="career" placeholder="e.g. astronaut, artist, scientist" autocomplete="off" />
  </div>
  <button onclick="generateStory()">Generate Story</button>
  <div class="story-output" id="output"></div>
  <script src="script.js"></script>
</body>
</html>
