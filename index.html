<!DOCTYPE html>
<html>
<head>
  <title>Representation Matters 🌈</title>
</head>
<body>

<h1>🌈 Representation Matters</h1>

<div id="setup">
  <h2>Tell us about you ✨</h2>

  <input id="race" placeholder="Race (optional)">
  <input id="gender" placeholder="Gender (optional)">
  <input id="career" placeholder="Career (optional)">

  <button onclick="saveProfile()">Start</button>
</div>

<div id="app" style="display:none;">
  <h2>Your Story ✨</h2>

  <button onclick="generateStory()">🎲 Generate Story</button>

  <div id="story"></div>

  <h3>📚 Saved Stories</h3>
  <div id="history"></div>
</div>

<script src="script.js"></script>
</body>
</html>
